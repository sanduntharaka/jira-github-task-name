name: Release VS Code Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.0.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and release VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package VSIX
        id: package
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          VSIX_NAME="${PACKAGE_NAME}-${PACKAGE_VERSION}.vsix"

          npx --yes @vscode/vsce package --allow-missing-repository --out "${VSIX_NAME}"

          echo "vsix_name=${VSIX_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.vsix_name }}
          path: ${{ steps.package.outputs.vsix_name }}
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.vsix_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
